<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Salmo do Dia</title>
</head>
<body>

<h1>🙏 Salmo do Dia</h1>
<p id="versiculo">Carregando...</p>

<script>
  const salmos = [
    "Salmo 23:1 - O Senhor é o meu pastor; nada me faltará.",
    "Salmo 91:1 - Aquele que habita no esconderijo do Altíssimo...",
    "Salmo 121:1 - Elevo os meus olhos para os montes...",
    "Salmo 46:1 - Deus é o nosso refúgio e fortaleza...",
    "Salmo 37:5 - Entrega o teu caminho ao Senhor..."
  ];

  const hoje = new Date().getDate();
  const indice = hoje % salmos.length;

  document.getElementById("versiculo").innerText = salmos[indice];
</script>

</body>
</html>
